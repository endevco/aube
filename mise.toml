[env]
_.path = ["./bin"]

[tools]
hk = "latest"
pkl = "latest"
pitchfork = "latest"
shellcheck = "latest"
shfmt = "latest"
actionlint = "latest"
node = "24"
usage = "latest"

[tasks.lint]
run = "hk check --all --slow"

[tasks.lint-fix]
run = "hk fix --all --slow"

[tasks.build]
# Compile once, then hardlink the multicall shims (`aubr`, `aubx`) next
# to the freshly built `aube` so basename dispatch in `main.rs` works
# for local `./target/debug/aubr …` / `./target/debug/aubx …` runs.
# Hardlinks are free on disk, survive macOS codesign, and let the BATS
# suite exercise the shims without a second compile pass.
run = [
  "cargo build",
  "ln -f target/debug/aube target/debug/aubr",
  "ln -f target/debug/aube target/debug/aubx",
]

[tasks.test]
run = "cargo test"

[tasks."docs:dev"]
depends = ["build"]
dir = "docs"
run = "../target/debug/aube install && exec ../target/debug/aube run docs:dev"

[tasks."docs:build"]
depends = ["build"]
dir = "docs"
run = "../target/debug/aube install && exec ../target/debug/aube run docs:build"

[tasks.bench]
dir = "{{config_root}}"
run = [
  "cargo build --release",
  "mise x aqua:sharkdp/hyperfine@latest aqua:pnpm/pnpm@latest npm:yarn@1 bun@latest node@24 -- bash benchmarks/bench.sh",
]

# Regenerate `benchmarks/results.json` (and the markdown summary) by
# re-running the full hyperfine scenario matrix with a release build
# and 10 runs × 3 warmups, then writing the structured output into
# the repo in-place. Commit the updated JSON and the chart on the
# VitePress benchmarks page picks it up automatically — the page's
# data loader at `docs/benchmarks.data.ts` reads it at build time.
[tasks."bench:bump"]
dir = "{{config_root}}"
env = { RUNS = "10", WARMUP = "3", RESULTS_JSON = "{{config_root}}/benchmarks/results.json" }
run = [
  "cargo build --release",
  "mise x aqua:sharkdp/hyperfine@latest aqua:pnpm/pnpm@latest npm:yarn@1 bun@latest node@24 -- bash benchmarks/bench.sh",
]

[tasks.render]
depends = ["build"]
run = [
  "./target/debug/aube usage > aube.usage.kdl",
  "rm -rf docs/cli && mkdir -p docs/cli",
  "usage g markdown -mf aube.usage.kdl --out-dir docs/cli --url-prefix /cli",
  "usage g json -f aube.usage.kdl > docs/cli/commands.json",
  "cargo run -p aube-settings --bin generate-settings-docs",
]
