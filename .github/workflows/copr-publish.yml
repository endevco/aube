name: copr-publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build from (e.g. v1.0.0-beta.1)"
        required: true
        type: string
      chroots:
        description: "COPR chroots to target (space-separated)"
        required: false
        default: "fedora-rawhide-aarch64 fedora-rawhide-x86_64 fedora-44-aarch64 fedora-44-x86_64 fedora-43-aarch64 fedora-43-x86_64 fedora-42-aarch64 fedora-42-x86_64 epel-10-aarch64 epel-10-x86_64"
        type: string

permissions: {}

env:
  PACKAGE_NAME: aube

jobs:
  publish-copr:
    runs-on: namespace-profile-endev-linux-amd64
    timeout-minutes: 150
    container:
      image: fedora:45
    permissions:
      contents: read
    steps:
      - name: Install packaging deps
        run: |
          dnf update -y
          # copr-cli comes from Fedora's own packages — Fedora 38+
          # enforces PEP 668 and blocks `pip install` into the system
          # Python.
          dnf install -y rpm-build rpmdevtools copr-cli git rust cargo gcc openssl-devel pkgconf-pkg-config tar gzip
          rpmdev-setuptree

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'release' && github.ref || inputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up environment variables
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_CHROOTS: ${{ inputs.chroots }}
          MAINTAINER_NAME: ${{ vars.COPR_MAINTAINER_NAME || 'aube Release Bot' }}
          MAINTAINER_EMAIL: ${{ vars.COPR_MAINTAINER_EMAIL || 'noreply@aube.en.dev' }}
          COPR_OWNER: ${{ vars.COPR_OWNER || 'jdxcode' }}
          COPR_PROJECT: ${{ vars.COPR_PROJECT || 'aube' }}
        run: |
          if [ "${EVENT_NAME}" = "release" ]; then
            TAG="${REF_NAME}"
            CHROOTS="fedora-rawhide-aarch64 fedora-rawhide-x86_64 fedora-44-aarch64 fedora-44-x86_64 fedora-43-aarch64 fedora-43-x86_64 fedora-42-aarch64 fedora-42-x86_64 epel-10-aarch64 epel-10-x86_64"
          else
            TAG="${INPUT_TAG}"
            CHROOTS="${INPUT_CHROOTS}"
          fi
          VERSION="${TAG#v}"

          {
            echo "VERSION=${VERSION}"
            echo "CHROOTS=${CHROOTS}"
            echo "PACKAGE_NAME=${PACKAGE_NAME}"
            echo "MAINTAINER_NAME=${MAINTAINER_NAME}"
            echo "MAINTAINER_EMAIL=${MAINTAINER_EMAIL}"
            echo "COPR_OWNER=${COPR_OWNER}"
            echo "COPR_PROJECT=${COPR_PROJECT}"
            echo "BUILD_PROFILE=release"
          } >> "$GITHUB_ENV"

      - name: Build and submit to COPR
        run: |
          ./packaging/copr/build-copr.sh \
            --version "${VERSION}" \
            --profile "${BUILD_PROFILE}" \
            --chroots "${CHROOTS}" \
            --owner "${COPR_OWNER}" \
            --project "${COPR_PROJECT}" \
            --name "${PACKAGE_NAME}" \
            --maintainer-name "${MAINTAINER_NAME}" \
            --maintainer-email "${MAINTAINER_EMAIL}"
        env:
          COPR_API_LOGIN: ${{ secrets.COPR_API_LOGIN }}
          COPR_API_TOKEN: ${{ secrets.COPR_API_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: copr-${{ env.VERSION }}
          path: artifacts/
          if-no-files-found: warn
